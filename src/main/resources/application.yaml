### server
server:
  port: ${SERVICE_PORT:8080}

### spring
spring:
  application:
    name: pos-transaction-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:pos_transaction}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration

### actuator
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      otlp:
        enabled: ${OTLP_TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  otlp:
    metrics:
      export:
        enabled: ${OTLP_METRICS_EXPORT_ENABLED:false}
        url: ${OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

### info
info:
  app:
    name: ${spring.application.name}
    description: ${spring.application.name} API
    version: ${APP_VERSION:@projectVersion@}

### openapi
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
